    ; PlatformIO project for MustangDash — Riverdi RVT70H (BT817/EVE4) on Teensy 4.1.
;
; This drives the VS Code Build/Upload buttons. It is a parallel build path to
; scripts/compile.sh (arduino-cli), which remains the reference build that
; tests/run-tests.sh and CI assume. Both must stay in sync; see BUILD.md.
;
; src_dir points at the existing sketch folder instead of PlatformIO's default
; src/, so the repo layout stays valid for the Arduino IDE and arduino-cli.

[platformio]
src_dir = MustangDash

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; The EVE library is vendored rather than pulled from the registry: src/EVE_config.h
; is edited to select the EVE_RVT70H profile, and src/EVE_target/ carries our pins.
lib_extra_dirs = libraries

monitor_speed = 115200

; STM32H743 migration target (docs/plans/2026-07-21-001-refactor-stm32-migration-plan.md).
; Board def: WeAct MiniSTM32H743VITX -- same STM32H743VIT6 as the custom carrier
; (KTD1), so the WeAct devkit doubles as a firmware mule until the PCB exists.
; USBCON/USBD_USE_CDC route Serial to the USB-C VCP (U6); the serial protocol
; rides CDC, so the 115200 monitor rate is nominal only.
[env:h743]
platform = ststm32
board = weact_mini_h743vitx
framework = arduino
lib_extra_dirs = libraries
monitor_speed = 115200
build_flags =
    -D USBCON
    -D USBD_USE_CDC
    -D USB_PRODUCT="\"MustangDash\""
    -D HAL_FDCAN_MODULE_ENABLED
; review fix: newlib-nano omits float printf by default -- without this every
; %.1f dash cell and banner value renders empty on the h743 target
    -Wl,-u,_printf_float

; Riverdi STM32 Evaluation Board (STM32F469II on the board; disco_f469ni is
; the same die/flash in PlatformIO's catalog). One RiBUS connector -> center
; panel only over SPI2; jumpers P9-P8 hand the panel to the STM32. Pin map
; from riverdi-eve host_layer/stm32f4: CS PB12, PD PH6, SPI2 PB13/14/15.
; No FDCAN on F4 -> dash_can.h compiles its stubs (no HAL_FDCAN flag).
; PROGRAMMING: SWD header (P10) + ST-LINK ONLY -- BOOT0 is board-strapped
; with no header access (schematic SCHEM_EVAL_MAIN_REV1.2), so USB DFU and
; UART bootloader are unreachable. Crystal is 12 MHz (X2): if USB CDC fails
; to enumerate, set -D HSE_VALUE=12000000 -- generic clock configs assume
; 8/25 MHz and a wrong HSE breaks the 48 MHz USB clock.
[env:riverdi_f469]
platform = ststm32
board = riverdi_f469
framework = arduino
lib_extra_dirs = libraries
monitor_speed = 115200
board_build.ldscript = boards/riverdi_f469_ldscript.ld
board_build.variants_dir = boards/variants
build_flags =
    -D USBCON
    -D USBD_USE_CDC
    -D USB_PRODUCT="\"MustangDash\""
    -D DASH_BOARD_RIVERDI_F469
    -Wl,-u,_printf_float
